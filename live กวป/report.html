      --ink:#0f172a; --ink2:#334155; --ink3:#64748b; --ink4:#94a3b8;
      --bg:#f8fafc; --card:#fff; --line:#e2e8f0; --r:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Prompt","IBM Plex Sans Thai",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}

    /* ── NAV ─────────────────────────────── */
    .nav{display:flex;align-items:center;gap:12px;padding:14px 32px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}

    .hero-name{font-size:24px;font-weight:700;line-height:1.2;margin-bottom:4px}
    .hero-en{font-size:13px;opacity:.75}
    .hero-stats{display:flex;gap:28px;margin-top:16px}
    .hstat{display:flex;flex-direction:column}
    .hstat-l{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
    .hstat-v{font-size:28px;font-weight:700;line-height:1;margin-top:3px;font-variant-numeric:tabular-nums}

    .status-badge.y{background:rgba(217,119,6,.2);border-color:rgba(217,119,6,.4)}
    .status-badge.r{background:rgba(220,38,38,.2);border-color:rgba(220,38,38,.4)}

    /* ── BODY ────────────────────────────── */
    .body{max-width:960px;margin:0 auto;padding:28px 32px 48px;display:flex;flex-direction:column;gap:24px}

    /* ── SECTION ─────────────────────────── */
    .section{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
    .section-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:8px}

    .section-body{padding:20px}

    .prov-list{display:flex;flex-direction:column;gap:12px}

    .prov-fill.y{background:var(--yellow)}
    .prov-fill.r{background:var(--red)}

    .prov-pct{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
    .prov-pct.g{color:var(--green)}.prov-pct.y{color:var(--yellow)}.prov-pct.r{color:var(--red)}
    .prov-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;text-align:center}
    .prov-badge.g{background:var(--green-lt);color:var(--green)}
    .prov-badge.y{background:var(--yellow-lt);color:var(--yellow)}
    .prov-badge.r{background:var(--red-lt);color:var(--red)}
    .prov-badge.na{background:#f1f5f9;color:var(--ink4)}

    /* ── LINE CHART ──────────────────────── */
    .chart-wrap{overflow-x:auto}

    /* ── TABLE ───────────────────────────── */
    .data-table{width:100%;border-collapse:collapse;font-size:13px}
    .data-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink3);text-transform:uppercase;border-bottom:2px solid var(--line)}

    /* ── FOOT ────────────────────────────── */

    /* ── LOADING / ERROR ─────────────────── */
    .loading{padding:60px;text-align:center;color:var(--ink3)}

    /* ── MAP ─────────────────────────────── */
    #province-map{height:380px;border-radius:8px;z-index:0}
    .map-legend{background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.15);font-family:"Prompt",sans-serif;font-size:12px;line-height:1.8}
    .map-legend b{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#0f172a}
    .legend-item{display:flex;align-items:center;gap:7px}
    .legend-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
    .leaflet-popup-content{font-family:"Prompt","IBM Plex Sans Thai",sans-serif!important}

      .hero{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      body{background:#fff}
      .section{break-inside:avoid}

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — อัปเดตให้ตรงกับ api.jsx เสมอ
// ══════════════════════════════════════════════════════════════════
const SHEET_ID = "1RlIRo8vZ0fgQOj-vVZ72P9ioUgxIY_WWQw4AfjNV_Pg";
const gvizBase = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;

function getThaiYear() {
  const now = new Date();
  return now.getFullYear() + (now.getMonth() + 1 >= 10 ? 544 : 543);
}
const _Y = getThaiYear();
const CUR  = String(_Y);
const PRE  = String(_Y - 1);
const PRE2 = String(_Y - 2);

const PROVINCES = {
  "33": "ศรีสะเกษ",
  "34": "อุบลราชธานี",
  "35": "ยโสธร",
  "37": "อำนาจเจริญ",
  "49": "มุกดาหาร"
};

const KPI_CONFIG = [
  { code:"NCD-03", name:"ผู้ป่วยเบาหวานควบคุมระดับน้ำตาลได้ดี",    en:"DM Good Control",              target:40, owner:"เครือข่าย NCD",              csvUrl:gvizBase+"s_dm_ht_control", yearCol:0, targetColIndex:6,  resultColIndex:7  },
  { code:"NCD-04", name:"ผู้ป่วยความดันโลหิตสูงควบคุมความดันได้ดี", en:"HT Good Control",              target:60, owner:"เครือข่าย NCD",              csvUrl:gvizBase+"s_dm_ht_control", yearCol:0, targetColIndex:8,  resultColIndex:9  },
  { code:"ELD-01", name:"ผู้สูงอายุ ADL ≥ 12 คะแนน",               en:"Elderly Good Functional Status",target:80, owner:"กลุ่มงานส่งเสริมสุขภาพ",   csvUrl:gvizBase+"s_aged10",        yearCol:0, targetColIndex:6,  resultColIndex:21 },
  { code:"CHD-02", name:"ทารกแรกเกิดน้ำหนักน้อยกว่า 2,500 กรัม",  en:"Low Birth Weight < 2,500g",    target:7,  owner:"กลุ่มงานอนามัยแม่และเด็ก", csvUrl:gvizBase+"s_child",         yearCol:0, targetColIndex:6,  resultColIndex:7,  inv:true },
  { code:"MCH-01", name:"ฝากครรภ์ครั้งแรก ก่อน 12 สัปดาห์",        en:"Early ANC (< 12 weeks)",       target:75, owner:"กลุ่มงานอนามัยแม่และเด็ก", csvUrl:gvizBase+"s_early_anc",     yearCol:0, targetColIndex:6,  resultColIndex:7  },
  { code:"MCH-02", name:"อัตราคลอดวัยรุ่น 15–19 ปี",               en:"Adolescent Birth Rate (15-19)",target:5,  owner:"กลุ่มงานอนามัยแม่และเด็ก", csvUrl:gvizBase+"s_labor1519",     yearCol:0, targetColIndex:6,  resultColIndex:9,  inv:true },
  { code:"NCD-01", name:"ร้อยละการคัดกรองโรคเบาหวาน (DM) กลุ่มเสี่ยง",  en:"DM Screening Rate", target:80, owner:"เครือข่าย NCD", csvUrl:null, fallbackV:78.4 },
  { code:"NCD-02", name:"ร้อยละการคัดกรองโรคความดันโลหิตสูง (HT)", en:"HT Screening Rate",    target:80, owner:"เครือข่าย NCD", csvUrl:null, fallbackV:82.1 },
];

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function parseCSV(str) {
  const arr = []; let quote = false, row = [], col = "", c;
  for (let i = 0; i < str.length; i++) {
    c = str[i];
    if (c==='"' && str[i+1]==='"') { col+='"'; i++; }
    else if (c==='"') { quote=!quote; }
    else if (c===',' && !quote) { row.push(col.trim()); col=""; }
    else if (c==='\n' && !quote) {
      if (str[i-1]==='\r') col=col.slice(0,-1);
      row.push(col.trim()); arr.push(row); col=""; row=[];
    } else { col+=c; }
  }
  if (col!=="") row.push(col.trim());
  if (row.length>0) arr.push(row);
  return arr;
}

function classify(pct, target, inv) {
  const r = inv ? target / Math.max(pct, 0.001) : pct / target;
  return r >= 0.95 ? "g" : r >= 0.75 ? "y" : "r";
}

function calcByProvince(rows, cfg, year) {
  const result = {};
  rows.slice(1).forEach(r => {
    if (!r[1]) return;
    if (r[cfg.yearCol] !== year) return;
    const pCode = String(r[3] ?? "").substring(0, 2);
    if (!PROVINCES[pCode]) return;
    if (!result[pCode]) result[pCode] = { tar: 0, res: 0 };
    result[pCode].tar += parseInt(r[cfg.targetColIndex]) || 0;
    result[pCode].res += parseInt(r[cfg.resultColIndex]) || 0;
  });
  return Object.entries(PROVINCES).map(([code, name]) => {
    const d = result[code];
    const pct = d && d.tar > 0 ? +(d.res / d.tar * 100).toFixed(1) : null;
    return { code, name, pct, tar: d?.tar ?? 0, res: d?.res ?? 0 };
  });
}

function fmt(n) { return n == null ? "—" : Number.isInteger(n) ? n : n.toFixed(1); }

// ══════════════════════════════════════════════════════════════════
// SVG CHARTS
// ══════════════════════════════════════════════════════════════════
function renderProvBars(provData, target, inv) {
  const maxPct = Math.max(target * 1.2, ...provData.map(p => p.pct ?? 0), 1);
  const targetPct = (target / maxPct * 100).toFixed(1);

  const rows = provData.map(p => {
    if (p.pct == null) return `
      <div class="prov-row">
        <div class="prov-name">${p.name}</div>
        <div class="prov-track"></div>
        <div class="prov-pct na">—</div>
        <div class="prov-badge na">ไม่มีข้อมูล</div>
      </div>`;
    const st = classify(p.pct, target, inv);
    const w  = (p.pct / maxPct * 100).toFixed(1);
    const lbl = inv ? (st==="g" ? "ต่ำกว่าเกณฑ์ ✅" : "เกินเกณฑ์") : (st==="g" ? "บรรลุ ✅" : st==="y" ? "เฝ้าระวัง" : "ต่ำกว่าเกณฑ์");
    return `
      <div class="prov-row">
        <div class="prov-name">${p.name}</div>
        <div class="prov-track">
          <div class="prov-fill ${st}" style="width:${w}%"></div>
          <div class="prov-target" style="left:${targetPct}%"></div>
        </div>
        <div class="prov-pct ${st}">${fmt(p.pct)}%</div>
        <div class="prov-badge ${st}">${lbl}</div>
      </div>`;
  });
  return `<div class="prov-list">${rows.join("")}</div>
    <div style="font-size:11px;color:var(--ink4);margin-top:14px;padding-left:132px">
      ▎ เส้นเป้าหมาย ${target}%</div>`;
}

function renderLineChart(aggData, target) {
  // aggData = [{year, pct}] 3 points
  const W=680, H=200, pL=44, pR=20, pT=28, pB=36;
  const vals = aggData.map(d => d.pct ?? 0);
  const maxV = Math.max(target * 1.15, ...vals, 1);
  const xPos = i => pL + (i / (aggData.length - 1)) * (W - pL - pR);
  const yPos = v => pT + (1 - v / maxV) * (H - pT - pB);
  const targetY = yPos(target);
  const col = "#0f766e";
  const pts = aggData.map((d, i) => [xPos(i), yPos(d.pct ?? 0)]);
  const path = pts.map((p, i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const area = `${path} L${pts[pts.length-1][0]},${H-pB} L${pts[0][0]},${H-pB} Z`;
  const ticks = [0, Math.round(maxV*0.5), Math.round(maxV)];
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${ticks.map(t=>`<g>
      <line x1="${pL}" x2="${W-pR}" y1="${yPos(t)}" y2="${yPos(t)}" stroke="#e2e8f0" stroke-dasharray="3 3"/>
      <text x="${pL-6}" y="${yPos(t)+4}" text-anchor="end" style="font:500 10px 'IBM Plex Sans';fill:#94a3b8">${t}</text>
    </g>`).join("")}
    <line x1="${pL}" x2="${W-pR}" y1="${targetY}" y2="${targetY}" stroke="#0f172a" stroke-dasharray="5 4" stroke-width="1.5" opacity="0.4"/>
    <text x="${W-pR-4}" y="${targetY-6}" text-anchor="end" style="font:600 10px 'IBM Plex Sans';fill:#0f172a">เป้า ${target}%</text>
    <path d="${area}" fill="${col}" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>
    ${pts.map((p, i) => {
      const d = aggData[i];
      return `<g>
        <circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#fff" stroke="${col}" stroke-width="2.5"/>
        <text x="${p[0]}" y="${p[1]-12}" text-anchor="middle" style="font:700 11px 'IBM Plex Sans';fill:#0f172a">${fmt(d.pct)}%</text>
        <text x="${p[0]}" y="${H-pB+16}" text-anchor="middle" style="font:${i===pts.length-1?"700":"500"} 11px 'IBM Plex Sans';fill:${i===pts.length-1?"#0f172a":"#64748b"}">${d.year}</text>
      </g>`;
    }).join("")}
  </svg></div>`;
}

function renderTable(provData, allYears) {
  const head = `<tr>
    <th>จังหวัด</th>
    ${allYears.map(y => `<th style="text-align:right">${y}</th>`).join("")}
    <th style="text-align:right">Δ (vs ปีก่อน)</th>
  </tr>`;
  const body = Object.values(PROVINCES).map(name => {
    const row = allYears.map(y => {
      const d = provData[y]?.find(p => p.name === name);
      return d?.pct ?? null;
    });
    const last = row[row.length - 1];
    const prev = row[row.length - 2];
    const delta = last != null && prev != null ? (last - prev).toFixed(1) : null;
    const dClass = delta == null ? "flat" : delta > 0 ? "up" : delta < 0 ? "dn" : "flat";
    const dText  = delta == null ? "—" : (delta > 0 ? `▲ ${Math.abs(delta)}` : delta < 0 ? `▼ ${Math.abs(delta)}` : "—");
    return `<tr>
      <td style="font-weight:500">${name}</td>
      ${row.map(v => `<td class="td-num">${v != null ? v + "%" : "—"}</td>`).join("")}
      <td class="td-delta ${dClass}">${dText}</td>
    </tr>`;
  }).join("");
  return `<table class="data-table"><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

// ══════════════════════════════════════════════════════════════════
// MAP (Leaflet + OSM + Thailand GeoJSON)
// ══════════════════════════════════════════════════════════════════

// English name → province code (Region 10)
const PROV_EN = {
  "Sisaket": "33", "Si Sa Ket": "33", "Sri Sa Ket": "33",
  "Ubon Ratchathani": "34", "Ubon Ratchatani": "34",
  "Yasothon": "35",
  "Amnat Charoen": "37", "Amnat Charoeng": "37",
  "Mukdahan": "49"
};

const STATUS_COLOR = { g:"#16a34a", y:"#d97706", r:"#dc2626" };
const STATUS_LABEL = { g:"บรรลุเป้าหมาย ✅", y:"เฝ้าระวัง ⚠", r:"ต่ำกว่าเกณฑ์ ❌" };

async function initMap(cfg, latestProv, latestYear) {
  const mapEl = document.getElementById("province-map");
  if (!mapEl) return;

  // Province name → data lookup
  const provLookup = {};
  latestProv.forEach(p => { provLookup[p.name] = p; });

  // Fetch Thailand GeoJSON
  let geoData;
  try {
    geoData = await fetch("https://raw.githubusercontent.com/apisit/thailand.json/master/thailand.json").then(r => r.json());
  } catch(e) {
    mapEl.innerHTML = `<div class="loading">โหลด GeoJSON ไม่สำเร็จ: ${e.message}</div>`;
    return;
  }

  // Filter to Region 10 only
  const region10 = {
    type: "FeatureCollection",
    features: geoData.features.filter(f => PROV_EN[f.properties.name])
  };

  if (region10.features.length === 0) {
    mapEl.innerHTML = `<div class="loading">ไม่พบข้อมูล GeoJSON ของ Region 10</div>`;
    return;
  }

  // Init Leaflet
  const map = L.map(mapEl, { zoomControl: true, scrollWheelZoom: false });

  // OSM tile layer
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 12
  }).addTo(map);

  // GeoJSON choropleth layer
  const geoLayer = L.geoJSON(region10, {
    style: feature => {
      const code    = PROV_EN[feature.properties.name];
      const pName   = PROVINCES[code];
      const p       = provLookup[pName];
      const st      = p?.pct != null ? classify(p.pct, cfg.target, cfg.inv) : "r";
      return {
        fillColor:   STATUS_COLOR[st],
        fillOpacity: 0.60,
        color:       "#fff",
        weight:      2
      };
    },
    onEachFeature: (feature, layer) => {
      const code  = PROV_EN[feature.properties.name];
      const pName = PROVINCES[code];
      const p     = provLookup[pName];
      const pct   = p?.pct ?? null;
      const st    = pct != null ? classify(pct, cfg.target, cfg.inv) : "r";

      layer.bindPopup(`
        <div style="font-family:'Prompt',sans-serif;min-width:170px;padding:4px 2px">
          <div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px">${pName}</div>
          <div style="font-size:28px;font-weight:700;color:${STATUS_COLOR[st]};line-height:1">
            ${pct != null ? pct + "%" : "—"}
          </div>
          <div style="font-size:11px;color:#64748b;margin-top:4px">
            เป้าหมาย ${cfg.target}% · ${STATUS_LABEL[st]}
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">ปีงบประมาณ ${latestYear}</div>
        </div>
      `, { maxWidth: 220 });

      layer.on("mouseover", e => {
        e.target.setStyle({ fillOpacity: 0.85, weight: 3, color: "#0f172a" });
        e.target.openPopup();
      });
      layer.on("mouseout",  e => {
        geoLayer.resetStyle(e.target);
        e.target.closePopup();
      });
      layer.on("click", () => layer.openPopup());
    }
  }).addTo(map);

  // Fit map to Region 10 bounds
  map.fitBounds(geoLayer.getBounds(), { padding: [24, 24] });

  // Legend
  const legend = L.control({ position: "bottomright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "map-legend");
    div.innerHTML = `
      <b>${cfg.code} · ปี ${latestYear}</b>
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>บรรลุเป้าหมาย</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>เฝ้าระวัง</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>ต่ำกว่าเกณฑ์</div>
      <div style="margin-top:6px;font-size:10.5px;color:#94a3b8">เป้า: ${cfg.target}% · คลิกจังหวัดเพื่อดูค่า</div>`;
    return div;
  };
  legend.addTo(map);
}

// ══════════════════════════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════════════════════════
async function main() {
  const params = new URLSearchParams(window.location.search);
  const kpiCode = params.get("kpi");
  const cfg = KPI_CONFIG.find(k => k.code === kpiCode);

  if (!cfg) {
    document.getElementById("body").innerHTML = `<div class="loading">ไม่พบ KPI: ${kpiCode || "(ไม่ระบุ)"}</div>`;
    return;
  }

  document.title = `${cfg.code} · ${cfg.name} | กวป. ศอ.10`;
  document.getElementById("nav-title").textContent = `${cfg.code} · ${cfg.en}`;

  // Fallback for mock KPIs
  if (!cfg.csvUrl) {
    const st = classify(cfg.fallbackV, cfg.target, cfg.inv);
    document.getElementById("hero").innerHTML = heroHTML(cfg, cfg.fallbackV, st);
    document.getElementById("body").innerHTML = `<div class="loading" style="padding:40px">ตัวชี้วัดนี้ยังไม่มีข้อมูล API — ใช้ค่าประมาณ ${cfg.fallbackV}%</div>`;
    return;
  }

  try {
    const text = await fetch(cfg.csvUrl).then(r => r.text());
    const rows = parseCSV(text);
    const years = [PRE2, PRE, CUR];

    // Per province data for each year
    const provByYear = {};
    years.forEach(y => { provByYear[y] = calcByProvince(rows, cfg, y); });

    // Aggregate per year
    const aggData = years.map(y => {
      const ps = provByYear[y];
      const totalTar = ps.reduce((s, p) => s + p.tar, 0);
      const totalRes = ps.reduce((s, p) => s + p.res, 0);
      return { year: `ปี ${y}`, pct: totalTar > 0 ? +(totalRes / totalTar * 100).toFixed(1) : null };
    });

    // Current year display
    const latestYear = provByYear[CUR].some(p => p.pct != null) ? CUR :
                       provByYear[PRE].some(p => p.pct != null) ? PRE : PRE2;
    const latestProv = provByYear[latestYear];
    const latestAgg  = aggData.find(a => a.year.includes(latestYear));
    const currPct = latestAgg?.pct ?? 0;
    const st = classify(currPct, cfg.target, cfg.inv);

    // Render hero
    document.getElementById("hero").innerHTML = heroHTML(cfg, currPct, st, latestYear);

    // Render sections
    const nonNullAgg = aggData.filter(a => a.pct != null);
    const lineData = nonNullAgg.length >= 2 ? aggData : [{year:`ปี ${PRE2}`,pct:currPct},{year:`ปี ${PRE}`,pct:currPct},{year:`ปี ${CUR}`,pct:currPct}];

    document.getElementById("body").innerHTML = `
      <div class="section">
        <div class="section-head">
          <h2>แผนที่รายจังหวัด</h2>
          <span class="section-sub">ข้อมูลปีงบประมาณ ${latestYear} · คลิกจังหวัดเพื่อดูรายละเอียด</span>
        </div>
        <div class="section-body" style="padding:0">
          <div id="province-map"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2>แนวโน้ม 3 ปี</h2>
          <span class="section-sub">ภาพรวมเขตสุขภาพที่ 10 · ${PRE2}–${CUR}</span>
        </div>
        <div class="section-body">${renderLineChart(lineData, cfg.target)}</div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2>ตารางเปรียบเทียบรายปี × จังหวัด</h2>
          <span class="section-sub">5 จังหวัด · ปีงบประมาณ ${PRE2}–${CUR}</span>
        </div>
        <div class="section-body">${renderTable(provByYear, years)}</div>
      </div>

      <div class="section">
        <div class="section-head"><h2>ผู้รับผิดชอบ</h2></div>
        <div class="section-body">
          <div style="display:flex;align-items:center;gap:12px;padding:8px;background:#f8fafc;border-radius:8px;border:1px solid var(--line)">
            <div style="width:40px;height:40px;border-radius:50%;background:#e0f2fe;display:grid;place-items:center;font-weight:700;font-size:13px;color:#0284c7">${cfg.owner.slice(0,2)}</div>
            <div>
              <div style="font-weight:600;font-size:13px">${cfg.owner}</div>
              <div style="font-size:11.5px;color:var(--ink3)">หน่วยงานเจ้าภาพตัวชี้วัด · ศูนย์อนามัยที่ 10</div>
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById("page-foot").innerHTML =
      `แหล่งข้อมูล: MOPH Open Data · Google Sheets ศอ.10 · สร้างเมื่อ ${new Date().toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"})}`;

    // Init map after DOM is ready
    await initMap(cfg, latestProv, latestYear);

  } catch (err) {
    document.getElementById("body").innerHTML = `<div class="loading">โหลดข้อมูลไม่สำเร็จ: ${err.message}</div>`;
    console.error(err);
  }
}

function heroHTML(cfg, currPct, st, year) {
  const stLabel = st==="g" ? "บรรลุเป้าหมาย" : st==="y" ? "เฝ้าระวัง" : "ต่ำกว่าเกณฑ์";
  const dot = {"g":"🟢","y":"🟡","r":"🔴"}[st];
  return `
    <div class="hero-top">
      <span class="hero-code">${cfg.code}</span>
      <span class="hero-pillar">P1 · ส่งเสริม ป้องกัน คุ้มครอง</span>
      <span class="status-badge ${st}">${dot} ${stLabel}</span>
    </div>
    <div class="hero-name">${cfg.name}</div>
    <div class="hero-en">${cfg.en}</div>
    <div class="hero-stats">
      <div class="hstat">
        <div class="hstat-l">ผลปัจจุบัน ${year ? `(${year})` : ""}</div>
        <div class="hstat-v">${currPct.toFixed(1)}<span class="hstat-u">%</span></div>
      </div>
      <div class="hstat">
        <div class="hstat-l">เป้าหมาย</div>
        <div class="hstat-v">${cfg.target}<span class="hstat-u">%</span></div>
      </div>
      <div class="hstat">
        <div class="hstat-l">ช่องว่าง</div>
        <div class="hstat-v" style="color:${currPct>=cfg.target?"#4ade80":"#fca5a5"}">
          ${currPct >= cfg.target ? "+" : ""}${(currPct - cfg.target).toFixed(1)}<span class="hstat-u">%</span>
        </div>
      </div>
    </div>`;
}

main();
</script>
</body>
</html>
